<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricketer Login Form</title>
</head>
<body>

<div>

    <h1 align="center"> Cricketer Login Form</h1>

    <form>

        <div>
            <label>Player ID:</label><br>
            <input type="text" placeholder="Enter Player ID" required>
        </div>

        <br>

        <div>
            <label>Email:</label><br>
            <input type="email" placeholder="Enter Email Address" required>
        </div>

        <br>

        <div>
            <label>Password:</label><br>
            <input type="password" placeholder="Enter Password" required>
        </div>

        <br>

        <div>
            <input type="checkbox" id="remember">
            <label for="remember">Remember Me</label>
        </div>

        <br>

        <div>
            <a href="https://www.bing.com/search?pglt=299&q=forget+password+link+page&cvid=32ce8942b6ec47d8893ed59f98e0a5da&gs_lcrp=EgRlZGdlKgYIABBFGDkyBggAEEUYOTIGCAEQABhAMgYIAhAAGEAyBggDEAAYQDIGCAQQABhAMgYIBRAAGEAyBggGEAAYQDIGCAcQABhAMgYICBAAGEDSAQkxNjEyMmowajeoAgCwAgA&FORM=ANNTA1&PC=DCTS">Forgot Password?
                
            </a>
        </div>

        <br>

        <div>
            <input type="submit" value="Login">
            <input type="reset" value="Clear">
        </div>

        <br>

        <div>
            <p>New Cricketer?
                <a href="https://t20icl.com/cricket-trial-registration-form-apply-online-for-2026/">Register Here</a>
            </p>
        </div>

    </form>

</div>

</body>
</html>
